<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TextForge</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

/* ══════════════════════════════
   DARK THEME (default)
══════════════════════════════ */
:root{
  --sage:#A3B18A;
  --sage-light:#c2ceaf;
  --sage-dim:rgba(163,177,138,0.13);
  --sage-border:rgba(163,177,138,0.25);
  --bg:#111a13;
  --bg2:#162019;
  --bg3:#0e1710;
  --hdr-bg:rgba(14,23,16,.95);
  --glass2:rgba(255,255,255,0.06);
  --text:#d8e4d0;
  --text-dim:#6b836a;
  --white:#f0f4ec;
  --title-col:#f0f4ec;
  --placeholder:rgba(107,131,106,.28);
  --sep:rgba(163,177,138,0.25);
  --editor-bg:transparent;
  --chip-hover-bg:rgba(163,177,138,0.13);
  --split-bg:#1a2a1c;
  --transition: background .3s, color .3s, border-color .3s;
}

/* ══════════════════════════════
   LIGHT THEME
══════════════════════════════ */
body.light{
  --sage:#6a9550;
  --sage-light:#4a7a30;
  --sage-dim:rgba(106,149,80,0.1);
  --sage-border:rgba(106,149,80,0.25);
  --bg:#f5f7f2;
  --bg2:#eef2e8;
  --bg3:#e8ede0;
  --hdr-bg:rgba(248,251,244,.97);
  --glass2:rgba(0,0,0,0.04);
  --text:#2a3a22;
  --text-dim:#7a9060;
  --white:#1a2a12;
  --title-col:#1a2a12;
  --placeholder:rgba(90,120,70,.3);
  --sep:rgba(106,149,80,0.2);
  --editor-bg:transparent;
  --chip-hover-bg:rgba(106,149,80,0.1);
  --split-bg:#edf2e6;
}

html,body{height:100%;overflow:hidden;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);color:var(--text);
  transition:var(--transition);
}
body:not(.light){
  background-image:
    radial-gradient(ellipse 50% 60% at 10% 50%,rgba(163,177,138,.06) 0%,transparent 70%),
    radial-gradient(ellipse 40% 40% at 90% 20%,rgba(163,177,138,.04) 0%,transparent 65%);
}
body.light{
  background-image:
    radial-gradient(ellipse 60% 50% at 20% 30%,rgba(180,210,160,.18) 0%,transparent 60%),
    radial-gradient(ellipse 40% 40% at 80% 70%,rgba(200,225,180,.12) 0%,transparent 55%);
}

#app{display:flex;flex-direction:column;height:100vh;width:100%;position:relative;}

/* ── HEADER ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;height:52px;flex-shrink:0;
  border-bottom:1px solid var(--sep);
  background:var(--hdr-bg);
  backdrop-filter:blur(14px);z-index:10;
  transition:var(--transition);
}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.05rem;
  letter-spacing:.3em;text-transform:uppercase;color:var(--white);}
.logo em{color:var(--sage);font-style:normal;}
.hdr-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.hdr-stats{font-size:.7rem;color:var(--text-dim);}
.hdr-stats span{color:var(--sage-light);font-weight:500;}

.icon-btn{
  background:transparent;border:1px solid var(--sep);border-radius:7px;
  color:var(--text-dim);padding:5px 10px;cursor:pointer;
  display:flex;align-items:center;gap:5px;
  font-size:.7rem;font-family:'DM Sans',sans-serif;
  transition:all .18s;white-space:nowrap;
}
.icon-btn:hover{border-color:var(--sage);color:var(--sage);}
.icon-btn.active{border-color:var(--sage);color:var(--sage);background:var(--sage-dim);}
.icon-btn svg{flex-shrink:0;}

/* Theme toggle pill */
.theme-toggle{
  display:flex;align-items:center;gap:0;
  border:1px solid var(--sep);border-radius:8px;overflow:hidden;
}
.theme-opt{
  background:transparent;border:none;padding:5px 11px;cursor:pointer;
  font-size:.69rem;font-family:'DM Sans',sans-serif;color:var(--text-dim);
  transition:all .18s;display:flex;align-items:center;gap:4px;
}
.theme-opt.active{background:var(--sage-dim);color:var(--sage);}
.theme-opt:hover:not(.active){color:var(--sage);}

/* ── EXPORT BAR ── */
.export-bar{
  display:flex;align-items:center;gap:8px;padding:8px 18px;
  background:var(--bg3);border-bottom:1px solid var(--sep);
  flex-shrink:0;flex-wrap:wrap;
  transition:var(--transition);
}
.eb-label{font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);}
.page-select{
  background:var(--glass2);border:1px solid var(--sep);
  border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;
  font-size:.77rem;padding:5px 9px;outline:none;cursor:pointer;
  transition:var(--transition);
}
.page-select option{background:var(--bg2);}
.xbtn{
  display:inline-flex;align-items:center;gap:5px;padding:6px 14px;
  border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.74rem;
  font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  cursor:pointer;border:1px solid transparent;transition:all .2s;white-space:nowrap;
}
.xbtn-prev{background:transparent;border-color:var(--sep);color:var(--text-dim);}
.xbtn-prev:hover{border-color:var(--sage);color:var(--sage);transform:translateY(-1px);}
.xbtn-doc{background:transparent;border-color:var(--sep);color:var(--text-dim);}
.xbtn-doc:hover{border-color:var(--sage);color:var(--sage);transform:translateY(-1px);}
.xbtn-pdf{background:var(--sage);color:#fff;border-color:var(--sage);}
body.light .xbtn-pdf{color:#fff;}
.xbtn-pdf:hover{opacity:.88;box-shadow:0 4px 14px rgba(106,149,80,.35);transform:translateY(-1px);}
.eb-right{margin-left:auto;display:flex;gap:7px;}

/* ── BODY ── */
.body{display:flex;flex:1;overflow:hidden;}

/* ── EDITOR ── */
.editor-panel{
  flex:1;display:flex;flex-direction:column;
  padding:18px 22px 0;border-right:1px solid var(--sep);
  overflow:hidden;min-width:0;transition:var(--transition);
}
.title-input{
  font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;
  letter-spacing:.07em;text-transform:uppercase;background:transparent;
  border:none;color:var(--title-col);outline:none;width:100%;
  padding-bottom:10px;border-bottom:1px solid var(--sep);
  transition:border-color .25s,color .3s;margin-bottom:12px;
}
.title-input::placeholder{color:var(--placeholder);}
.title-input:focus{border-bottom-color:var(--sage);}

.format-row{
  display:flex;align-items:center;gap:5px;padding-bottom:9px;
  border-bottom:1px solid var(--sep);margin-bottom:10px;flex-wrap:wrap;
}
.fmt-btn{
  background:transparent;border:1px solid transparent;border-radius:5px;
  color:var(--text-dim);font-size:.77rem;padding:4px 9px;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all .18s;font-weight:500;
}
.fmt-btn:hover{border-color:var(--sep);color:var(--sage);background:var(--sage-dim);}
.fmt-sep{width:1px;height:16px;background:var(--sep);}
.font-ctrl-row{display:flex;align-items:center;gap:7px;font-size:.71rem;color:var(--text-dim);}
.font-slider{
  -webkit-appearance:none;width:58px;height:2px;
  background:var(--sep);border-radius:2px;outline:none;cursor:pointer;
}
.font-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:10px;height:10px;
  border-radius:50%;background:var(--sage);cursor:pointer;
}
.font-val{color:var(--sage-light);font-weight:500;min-width:26px;font-size:.71rem;}
.align-btn{
  background:transparent;border:1px solid transparent;border-radius:4px;
  padding:3px 6px;cursor:pointer;color:var(--text-dim);transition:all .18s;font-size:.74rem;
}
.align-btn:hover,.align-btn.active{color:var(--sage);border-color:var(--sep);}

.text-editor{
  flex:1;width:100%;background:transparent;border:none;outline:none;
  resize:none;color:var(--text);font-family:'DM Sans',sans-serif;
  font-size:15px;line-height:1.9;font-weight:300;overflow-y:auto;
  padding-bottom:12px;scrollbar-width:thin;scrollbar-color:var(--sep) transparent;
  transition:color .3s;
}
.text-editor::placeholder{color:var(--placeholder);}

.editor-footer{
  display:flex;align-items:center;gap:8px;padding:9px 0 11px;
  border-top:1px solid var(--sep);flex-wrap:wrap;
}
.ef-btn{
  background:transparent;border:1px solid transparent;border-radius:5px;
  color:var(--text-dim);font-size:.72rem;padding:4px 10px;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all .18s;
  display:inline-flex;align-items:center;gap:4px;
}
.ef-btn:hover{color:var(--sage);border-color:var(--sep);}
.ef-right{margin-left:auto;}
.char-limit{font-size:.67rem;color:var(--text-dim);}
.char-limit span{color:var(--sage-light);}

/* ── AI PANEL ── */
.ai-panel{
  width:310px;flex-shrink:0;display:flex;flex-direction:column;
  background:var(--bg2);border-left:1px solid var(--sep);
  transition:var(--transition);
}
/* Hide AI in split mode */
.body.split-mode .ai-panel{display:none;}

.ai-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 15px;border-bottom:1px solid var(--sep);
}
.ai-hdr-left{display:flex;align-items:center;gap:8px;}
.ai-dot{
  width:7px;height:7px;border-radius:50%;background:var(--sage);
  box-shadow:0 0 8px var(--sage);animation:pulse 2.4s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 8px var(--sage);}50%{opacity:.3;box-shadow:0 0 3px var(--sage);}}
.ai-label{
  font-family:'Syne',sans-serif;font-size:.71rem;font-weight:700;
  letter-spacing:.2em;text-transform:uppercase;color:var(--sage-light);
}
.clear-chat-btn{
  background:transparent;border:none;color:var(--text-dim);font-size:.67rem;
  cursor:pointer;padding:3px 7px;border-radius:4px;font-family:'DM Sans',sans-serif;
  transition:color .18s;
}
.clear-chat-btn:hover{color:var(--sage);}
.ai-messages{
  flex:1;overflow-y:auto;padding:13px 12px;display:flex;flex-direction:column;
  gap:10px;scrollbar-width:thin;scrollbar-color:var(--sep) transparent;
}
.ai-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:7px;text-align:center;padding:20px;
}
.ai-empty-icon{font-size:1.9rem;opacity:.18;margin-bottom:4px;}
.ai-empty-title{
  font-family:'Syne',sans-serif;font-size:.8rem;font-weight:700;
  letter-spacing:.1em;color:var(--sage-light);
}
.ai-empty-sub{font-size:.74rem;color:var(--text-dim);font-weight:300;line-height:1.6;}
.msg{
  padding:10px 12px;border-radius:10px;font-size:.81rem;line-height:1.65;
  font-weight:300;animation:fadeUp .25s ease;word-break:break-word;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.msg-user{
  background:var(--sage-dim);border:1px solid var(--sep);
  color:var(--sage-light);align-self:flex-end;max-width:92%;
}
.msg-ai{
  background:var(--glass2);border:1px solid var(--sep);
  color:var(--text);align-self:flex-start;max-width:96%;
}
.apply-block{
  margin-top:8px;padding:9px 11px;background:var(--sage-dim);
  border-left:2px solid var(--sage);border-radius:0 6px 6px 0;
  font-size:.78rem;white-space:pre-wrap;word-break:break-word;color:var(--text);
}
.apply-btn{
  display:inline-flex;align-items:center;gap:4px;margin-top:6px;
  padding:4px 11px;background:var(--sage-dim);border:1px solid var(--sep);
  border-radius:5px;color:var(--sage);font-size:.71rem;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-weight:500;transition:all .18s;
}
.apply-btn:hover{opacity:.8;transform:translateY(-1px);}
.typing-indicator{
  display:flex;gap:4px;padding:10px 12px;background:var(--glass2);
  border:1px solid var(--sep);border-radius:10px;
  width:fit-content;align-self:flex-start;
}
.t-dot{width:5px;height:5px;border-radius:50%;background:var(--text-dim);animation:tdot 1.2s infinite;}
.t-dot:nth-child(2){animation-delay:.18s;}.t-dot:nth-child(3){animation-delay:.36s;}
@keyframes tdot{0%,100%{transform:translateY(0);opacity:.35;}50%{transform:translateY(-4px);opacity:1;}}
.chips{display:flex;gap:5px;padding:0 12px 9px;flex-wrap:wrap;}
.chip{
  padding:4px 9px;border-radius:20px;border:1px solid var(--sep);
  font-size:.68rem;color:var(--text-dim);cursor:pointer;transition:all .18s;
  font-family:'DM Sans',sans-serif;font-weight:300;
}
.chip:hover{border-color:var(--sage);color:var(--sage);background:var(--chip-hover-bg);}
.ai-input-row{
  display:flex;gap:7px;align-items:flex-end;
  padding:10px 12px;border-top:1px solid var(--sep);
}
.ai-input{
  flex:1;background:var(--glass2);border:1px solid var(--sep);
  border-radius:8px;padding:8px 11px;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:.81rem;font-weight:300;
  outline:none;resize:none;min-height:37px;max-height:95px;
  transition:border-color .2s,color .3s,background .3s;line-height:1.5;
}
.ai-input::placeholder{color:var(--text-dim);opacity:.5;}
.ai-input:focus{border-color:var(--sage);}
.send-btn{
  width:37px;height:37px;border-radius:8px;background:var(--sage);
  border:none;cursor:pointer;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;transition:all .18s;
}
.send-btn:hover{opacity:.85;transform:translateY(-1px);}
.send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* ══════════════════════════════
   SPLIT VIEW PANEL
══════════════════════════════ */
.split-preview{
  display:none;
  width:45%;flex-shrink:0;
  background:var(--split-bg);
  border-left:1px solid var(--sep);
  overflow-y:auto;
  flex-direction:column;
  transition:var(--transition);
  scrollbar-width:thin;
  scrollbar-color:var(--sep) transparent;
}
.body.split-mode .split-preview{display:flex;}
.body.split-mode .editor-panel{border-right:none;}

.sp-header{
  position:sticky;top:0;z-index:5;
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 16px;
  background:var(--bg3);
  border-bottom:1px solid var(--sep);
  flex-shrink:0;
}
.sp-label{
  font-family:'Syne',sans-serif;font-size:.68rem;font-weight:700;
  letter-spacing:.2em;text-transform:uppercase;color:var(--sage-light);
  display:flex;align-items:center;gap:6px;
}
.sp-live-dot{
  width:5px;height:5px;border-radius:50%;background:#6ec06e;
  box-shadow:0 0 6px #6ec06e;animation:pulse 2s infinite;
}
.sp-pages{font-size:.65rem;color:var(--text-dim);}

.sp-body{
  flex:1;display:flex;justify-content:center;
  padding:24px 16px 40px;
}

/* The white paper in split view */
.sp-paper{
  background:#fff;
  width:100%;max-width:580px;
  min-height:400px;
  padding:14mm 14mm 18mm;
  box-shadow:0 4px 28px rgba(0,0,0,.18);
  border-radius:3px;
  font-family:Georgia,'Times New Roman',serif;
  color:#1a1a1a;font-size:10.5pt;line-height:1.82;
  flex-shrink:0;
}
body.light .sp-paper{box-shadow:0 4px 24px rgba(0,0,0,.1);}

/* Paper elements — same as preview */
.pv-accentbar{height:3px;background:#A3B18A;margin-bottom:14px;border-radius:1px;}
.pv-doc-title{
  font-family:'Helvetica Neue',Arial,sans-serif;font-size:1.9em;font-weight:900;
  color:#0d1f0d;line-height:1.15;margin-bottom:3px;
}
.pv-doc-date{font-size:.68em;color:#aaa;margin-bottom:10px;font-family:Arial,sans-serif;}
.pv-doc-sep{border:none;border-top:1px solid #e0e0e0;margin-bottom:18px;}
.pv-h1{
  font-family:'Helvetica Neue',Arial,sans-serif;font-size:1.5em;font-weight:800;
  color:#0d1f0d;margin:20px 0 5px;padding-bottom:4px;
  border-bottom:2px solid #A3B18A;line-height:1.25;
}
.pv-h2{
  font-family:'Helvetica Neue',Arial,sans-serif;font-size:1.15em;font-weight:700;
  color:#1a3a1a;margin:16px 0 4px;
}
.pv-h3{
  font-family:'Helvetica Neue',Arial,sans-serif;font-size:.97em;font-weight:700;
  font-style:italic;color:#3a5a3a;margin:11px 0 3px;
}
.pv-quote{
  background:#f2f7ee;border-left:3.5px solid #A3B18A;
  padding:10px 16px;margin:10px 0 14px;border-radius:0 6px 6px 0;
  font-size:.91em;color:#2a4a2a;line-height:1.72;
  font-family:'Helvetica Neue',Arial,sans-serif;
}
.pv-hr{border:none;border-top:1px solid #e8e8e8;margin:14px 0;}
.pv-para{margin-bottom:7px;font-weight:400;}
.pv-footer-bar{
  margin-top:24px;border-top:1px solid #e8e8e8;padding-top:5px;
  display:flex;justify-content:space-between;
  font-size:.65em;color:#bbb;font-family:Arial,sans-serif;
}
.sp-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:200px;gap:8px;text-align:center;color:var(--text-dim);
}
.sp-empty-icon{font-size:2rem;opacity:.2;}
.sp-empty-txt{font-size:.78rem;}

/* ══════════════════════════════
   PREVIEW OVERLAY (fullscreen preview)
══════════════════════════════ */
#previewOverlay{
  position:absolute;inset:0;z-index:100;
  background:rgba(4,10,5,.94);backdrop-filter:blur(10px);
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;transition:opacity .22s ease;
}
body.light #previewOverlay{background:rgba(220,235,210,.95);}
#previewOverlay.open{opacity:1;pointer-events:all;}

.pv-topbar{
  display:flex;align-items:center;gap:10px;padding:11px 20px;
  background:rgba(8,16,9,.98);border-bottom:1px solid var(--sep);
  flex-shrink:0;flex-wrap:wrap;
}
body.light .pv-topbar{background:rgba(235,245,228,.98);}
.pv-label{
  font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;
  letter-spacing:.22em;text-transform:uppercase;color:var(--sage-light);
}
.pv-close{
  margin-left:auto;background:transparent;border:1px solid rgba(224,112,112,.4);
  border-radius:7px;color:#e07070;padding:5px 14px;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:.74rem;font-weight:500;transition:all .18s;
}
.pv-close:hover{background:rgba(224,112,112,.1);}
.pv-dl-pdf{
  background:var(--sage);color:#fff;border:none;border-radius:7px;
  padding:6px 16px;font-family:'DM Sans',sans-serif;font-size:.74rem;
  font-weight:600;cursor:pointer;transition:all .18s;letter-spacing:.06em;
}
.pv-dl-pdf:hover{opacity:.85;}
.pv-dl-doc{
  background:transparent;border:1px solid var(--sep);border-radius:7px;
  color:var(--sage-light);padding:5px 14px;font-family:'DM Sans',sans-serif;
  font-size:.74rem;cursor:pointer;transition:all .18s;
}
.pv-dl-doc:hover{border-color:var(--sage);color:var(--sage);}
.pv-body{
  flex:1;overflow-y:auto;display:flex;justify-content:center;
  padding:36px 20px 60px;background:#2e2e2e;
  scrollbar-width:thin;scrollbar-color:#555 #2e2e2e;
}
body.light .pv-body{background:#d0dbc8;}
.pv-paper{
  background:#fff;padding:22mm 22mm 30mm;
  box-shadow:0 12px 60px rgba(0,0,0,.55);border-radius:2px;
  font-family:Georgia,'Times New Roman',serif;color:#1a1a1a;
  font-size:11.5pt;line-height:1.85;
  width:210mm;min-height:297mm;position:relative;flex-shrink:0;
}
.pv-paper.ps-a5{width:148mm;min-height:210mm;font-size:9.5pt;padding:16mm 16mm 24mm;}
.pv-paper.ps-a3{width:297mm;min-height:420mm;font-size:12.5pt;}
.pv-paper.ps-a2{width:420mm;min-height:594mm;font-size:14pt;}
.pv-paper.ps-a1{width:594mm;min-height:841mm;font-size:16pt;}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:22px;left:50%;
  transform:translateX(-50%) translateY(14px);
  background:var(--sage);color:#fff;padding:8px 20px;
  border-radius:8px;font-size:.77rem;font-weight:600;opacity:0;

<script>
const GROQ_KEY = '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';
const MODEL    = 'llama-3.3-70b-versatile';
const MAX_CHARS = 5000;
let chatHistory = [], busy = false, currentAlign = 'left';
let splitActive = false;

const te = document.getElementById('textEditor');
const ti = document.getElementById('titleInput');

/* ─── THEME ─── */
function setTheme(t){
  document.body.classList.toggle('light', t==='light');
  document.getElementById('thDark').classList.toggle('active', t==='dark');
  document.getElementById('thLight').classList.toggle('active', t==='light');
  localStorage.setItem('tf-theme', t);
}
// Restore saved theme
(function(){ const s=localStorage.getItem('tf-theme'); if(s) setTheme(s); })();

/* ─── STATS ─── */
te.addEventListener('input', ()=>{ updateStats(); if(splitActive) renderSplit(); });
ti.addEventListener('input', ()=>{ if(splitActive) renderSplit(); });
document.getElementById('pageSize').addEventListener('change', ()=>{ if(splitActive) renderSplit(); });

function updateStats(){
  const v = te.value;
  const w = v.trim() ? v.trim().split(/\s+/).length : 0;
  document.getElementById('wordNum').textContent = w;
  document.getElementById('charNum').textContent = v.length;
  const cl = document.getElementById('charLeft');
  cl.textContent = Math.max(0, MAX_CHARS - v.length);
  cl.style.color = v.length > MAX_CHARS ? '#e07070' : '';
}

/* ─── FONT SLIDER ─── */
document.getElementById('fontSlider').addEventListener('input', function(){
  te.style.fontSize = this.value + 'px';
  document.getElementById('fontVal').textContent = this.value;
});

/* ─── ALIGNMENT ─── */
function setAlign(a){
  currentAlign = a;
  te.style.textAlign = a;
  ['left','center','right'].forEach(x =>
    document.getElementById('al-'+x).classList.toggle('active', x===a));
  if(splitActive) renderSplit();
}

/* ─── FORMAT WRAP ─── */
function fmtWrap(m){
  const s=te.selectionStart, e=te.selectionEnd, sel=te.value.slice(s,e);
  if(!sel){ toast('Select text first'); return; }
  te.value = te.value.slice(0,s)+m+sel+m+te.value.slice(e);
  updateStats();
}

/* ─── CLEAR / COPY ─── */
function clearAll(){
  if(!te.value.trim()&&!ti.value.trim()) return;
  if(!confirm('Clear everything?')) return;
  te.value=''; ti.value=''; updateStats();
  if(splitActive) renderSplit();
}
function copyText(){
  if(!te.value.trim()){ toast('Nothing to copy'); return; }
  navigator.clipboard.writeText(te.value).then(()=>toast('Copied! ✓'));
}

/* ─── TOAST ─── */
function toast(msg,dur=2400){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),dur);
}

/* ─── FULLSCREEN ─── */
function toggleFS(){
  const el=document.documentElement;
  const req=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen;
  const ex=document.exitFullscreen||document.webkitExitFullscreen||document.mozCancelFullScreen;
  (!document.fullscreenElement&&!document.webkitFullscreenElement)
    ? req&&req.call(el) : ex&&ex.call(document);
}
function onFSChange(){
  const inFS=!!(document.fullscreenElement||document.webkitFullscreenElement);
  document.getElementById('fsTxt').textContent = inFS?'Exit':'Full';
  const ic=document.getElementById('fsIcon');
  ic.innerHTML = inFS
    ? '<path d="M8 3v3a2 2 0 01-2 2H3m18 0h-3a2 2 0 01-2-2V3m0 18v-3a2 2 0 012-2h3M3 16h3a2 2 0 012 2v3"/>'
    : '<path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>';
}
document.addEventListener('fullscreenchange', onFSChange);
document.addEventListener('webkitfullscreenchange', onFSChange);

/* ─── SPLIT VIEW ─── */
function toggleSplit(){
  splitActive = !splitActive;
  const body = document.getElementById('mainBody');
  const btn  = document.getElementById('splitBtn');
  const txt  = document.getElementById('splitTxt');
  body.classList.toggle('split-mode', splitActive);
  btn.classList.toggle('active', splitActive);
  txt.textContent = splitActive ? 'Editor' : 'Split';
  if(splitActive) renderSplit();
}

function inlineHTML(txt){
  return txt
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/_(.*?)_/g,'<em>$1</em>');
}

function parsePV(raw){
  const t=raw.trim();
  if(!t)            return {type:'empty'};
  if(/^---+$/.test(t)) return {type:'hr'};
  if(/^### /.test(raw)) return {type:'h3',text:raw.slice(4)};
  if(/^## /.test(raw))  return {type:'h2',text:raw.slice(3)};
  if(/^# /.test(raw))   return {type:'h1',text:raw.slice(2)};
  if(/^> ?/.test(raw))  return {type:'quote',text:raw.replace(/^> ?/,'')};
  return {type:'body',text:raw};
}

function buildPaperHTML(title, content, align){
  const now=new Date();
  const dateStr=now.toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
  let html='';
  if(title){
    html+=`<div class="pv-accentbar"></div>`;
    html+=`<div class="pv-doc-title">${inlineHTML(title)}</div>`;
    html+=`<div class="pv-doc-date">${dateStr}</div>`;
    html+=`<hr class="pv-doc-sep">`;
  }
  for(const raw of content.split('\n')){
    const {type,text}=parsePV(raw);
    switch(type){
      case 'empty': html+=`<div style="height:8px"></div>`; break;
      case 'hr':    html+=`<hr class="pv-hr">`; break;
      case 'h1':    html+=`<div class="pv-h1">${inlineHTML(text)}</div>`; break;
      case 'h2':    html+=`<div class="pv-h2">${inlineHTML(text)}</div>`; break;
      case 'h3':    html+=`<div class="pv-h3">${inlineHTML(text)}</div>`; break;
      case 'quote': html+=`<div class="pv-quote">${inlineHTML(text)}</div>`; break;
      case 'body':  html+=`<div class="pv-para" style="text-align:${align}">${inlineHTML(text)}</div>`; break;
    }
  }
  html+=`<div class="pv-footer-bar">
    <span>${inlineHTML(title||'Untitled')}</span>
    <span>${dateStr} · ${document.getElementById('pageSize').value.toUpperCase()}</span>
    <span>Page 1</span>
  </div>`;
  return html;
}

function renderSplit(){
  const title=ti.value.trim(), content=te.value.trim();
  document.getElementById('spPageLabel').textContent = document.getElementById('pageSize').value.toUpperCase();
  const paper=document.getElementById('spPaper');
  if(!title&&!content){
    paper.innerHTML=`<div class="sp-empty"><div class="sp-empty-icon">📄</div><div class="sp-empty-txt">Start typing to see preview</div></div>`;
    return;
  }
  paper.innerHTML = buildPaperHTML(title, content, currentAlign);
}

/* ─── FULL PREVIEW ─── */
function openPreview(){
  const title=ti.value.trim(), content=te.value.trim();
  if(!title&&!content){ toast('Nothing to preview!'); return; }
  const ps=document.getElementById('pageSize').value;
  const paper=document.getElementById('pvPaper');
  paper.className='pv-paper ps-'+ps;
  paper.innerHTML = buildPaperHTML(title, content, currentAlign);
  document.getElementById('previewOverlay').classList.add('open');
}
function closePreview(){
  document.getElementById('previewOverlay').classList.remove('open');
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closePreview(); });

/* ─── PDF EXPORT ─── */
const PAGE_DIMS={a1:[594,841],a2:[420,594],a3:[297,420],a4:[210,297],a5:[148,210]};

function parseLine(raw){
  if(/^### /.test(raw)) return {type:'h3',text:raw.slice(4).trim()};
  if(/^## /.test(raw))  return {type:'h2',text:raw.slice(3).trim()};
  if(/^# /.test(raw))   return {type:'h1',text:raw.slice(2).trim()};
  if(/^> ?/.test(raw))  return {type:'quote',text:raw.replace(/^> ?/,'').trim()};
  if(/^---+$/.test(raw.trim())) return {type:'hr'};
  if(!raw.trim())        return {type:'empty'};
  return {type:'body',text:raw};
}
function stripInline(t){ return t.replace(/\*\*(.*?)\*\*/g,'$1').replace(/_(.*?)_/g,'$1'); }

function exportPDF(){
  const {jsPDF}=window.jspdf;
  const title=ti.value.trim(), content=te.value.trim();
  if(!content&&!title){ toast('Write something first!'); return; }
  const ps=document.getElementById('pageSize').value;
  const [pw,ph]=PAGE_DIMS[ps];
  const isSmall=ps==='a5';
  const ml=22,mr=22,mw=pw-ml-mr,topM=28,botM=20;
  const doc=new jsPDF({unit:'mm',format:ps});
  const jalign=currentAlign==='center'?'center':currentAlign==='right'?'right':'left';
  const xpos=jalign==='center'?pw/2:jalign==='right'?pw-mr:ml;
  const SZ={h1:isSmall?17:24,h2:isSmall?13:17,h3:isSmall?11:13,body:isSmall?9:11,quote:isSmall?8.5:10,small:7.5};
  const LH={h1:isSmall?9:11.5,h2:isSmall?7:9,h3:isSmall?6:7.5,body:isSmall?5.5:6.5,quote:isSmall?5:6};
  let y=topM;
  function chkPage(n){ if(y+n>ph-botM){doc.addPage();y=topM;drawHdr();} }
  function drawHdr(){
    if(!title)return;
    doc.setFont('helvetica','normal');doc.setFontSize(SZ.small-1);doc.setTextColor(180,180,180);
    doc.text(title.substring(0,50),ml,14);
    doc.setDrawColor(220,220,220);doc.setLineWidth(.2);doc.line(ml,16,pw-mr,16);
  }
  if(title){
    doc.setFillColor(163,177,138);doc.rect(ml,y-6,mw,1.2,'F');y+=5;
    doc.setFont('helvetica','bold');doc.setFontSize(SZ.h1);doc.setTextColor(13,25,13);
    const tl=doc.splitTextToSize(title,mw);doc.text(tl,ml,y);y+=tl.length*LH.h1+3;
    const now=new Date();const ds=now.toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
    doc.setFont('helvetica','normal');doc.setFontSize(SZ.small);doc.setTextColor(160,160,160);
    doc.text(ds,ml,y);y+=5;
    doc.setDrawColor(220,220,220);doc.setLineWidth(.3);doc.line(ml,y,pw-mr,y);y+=10;
  }
  for(const raw of content.split('\n')){
    const {type,text}=parseLine(raw);
    if(type==='empty'){y+=isSmall?2.5:3.5;continue;}
    if(type==='hr'){chkPage(5);doc.setDrawColor(200,200,200);doc.setLineWidth(.3);doc.line(ml,y,pw-mr,y);y+=7;continue;}
    if(type==='h1'){
      chkPage(LH.h1+10);if(y>topM+10)y+=4;
      doc.setFont('helvetica','bold');doc.setFontSize(SZ.h1);doc.setTextColor(13,25,13);
      const tl=doc.splitTextToSize(stripInline(text),mw);doc.text(tl,ml,y);y+=tl.length*LH.h1+1;
      doc.setDrawColor(163,177,138);doc.setLineWidth(.6);doc.line(ml,y,pw-mr,y);y+=7;continue;
    }
    if(type==='h2'){
      chkPage(LH.h2+6);if(y>topM+10)y+=3;
      doc.setFont('helvetica','bold');doc.setFontSize(SZ.h2);doc.setTextColor(26,55,26);
      const tl=doc.splitTextToSize(stripInline(text),mw);doc.text(tl,ml,y);y+=tl.length*LH.h2+5;continue;
    }
    if(type==='h3'){
      chkPage(LH.h3+4);
      doc.setFont('helvetica','bolditalic');doc.setFontSize(SZ.h3);doc.setTextColor(58,88,58);
      const tl=doc.splitTextToSize(stripInline(text),mw);doc.text(tl,ml,y);y+=tl.length*LH.h3+4;continue;
    }
    if(type==='quote'){
      const qInd=5,qPad=3,qMW=mw-qInd-qPad;
      doc.setFont('helvetica','normal');doc.setFontSize(SZ.quote);
      const sl=doc.splitTextToSize(stripInline(text),qMW);
      const bh=sl.length*LH.quote+qPad*2+2;chkPage(bh+6);
      doc.setFillColor(242,247,238);doc.roundedRect(ml,y-1,mw,bh,1.5,1.5,'F');
      doc.setFillColor(163,177,138);doc.rect(ml,y-1,2,bh,'F');
      doc.setTextColor(45,74,45);doc.text(sl,ml+qInd,y+qPad+LH.quote*0.7);
      y+=bh+6;continue;
    }
    const sl=doc.splitTextToSize(stripInline(text),mw);chkPage(sl.length*LH.body+2);
    doc.setFont('helvetica','normal');doc.setFontSize(SZ.body);doc.setTextColor(35,35,35);
    doc.text(sl,xpos,y,{align:jalign,maxWidth:mw});y+=sl.length*LH.body+2.5;
  }
  const pages=doc.internal.getNumberOfPages();
  for(let p=1;p<=pages;p++){
    doc.setPage(p);doc.setFontSize(SZ.small-0.5);doc.setTextColor(180,180,180);
    doc.setDrawColor(220,220,220);doc.setLineWidth(.2);doc.line(ml,ph-14,pw-mr,ph-14);
    doc.text(`Page ${p} of ${pages}`,pw/2,ph-10,{align:'center'});
    if(title)doc.text(title.substring(0,40),ml,ph-10);
  }
  doc.save(`${title||'document'}.pdf`);
  toast('PDF exported! ✓');
}

/* ─── DOCX EXPORT ─── */
async function exportDOCX(){
  const title=ti.value.trim(),content=te.value.trim();
  if(!content&&!title){toast('Write something first!');return;}
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const jc=currentAlign==='center'?'center':currentAlign==='right'?'right':'left';
  function runs(text,extra=''){
    return text.split(/(\*\*.*?\*\*|_.*?_)/g).map(p=>{
      if(/^\*\*(.*)\*\*$/.test(p))return`<w:r><w:rPr><w:b/>${extra}</w:rPr><w:t xml:space="preserve">${esc(p.slice(2,-2))}</w:t></w:r>`;
      if(/^_(.*?)_$/.test(p))return`<w:r><w:rPr><w:i/>${extra}</w:rPr><w:t xml:space="preserve">${esc(p.slice(1,-1))}</w:t></w:r>`;
      return p?`<w:r><w:rPr>${extra}</w:rPr><w:t xml:space="preserve">${esc(p)}</w:t></w:r>`:'';
    }).join('');
  }
  const now=new Date();const ds=now.toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
  let body='';
  if(title){
    body+=`<w:p><w:pPr><w:spacing w:before="0" w:after="40"/><w:pBdr><w:top w:val="single" w:sz="18" w:space="4" w:color="A3B18A"/></w:pBdr></w:pPr><w:r><w:rPr><w:b/><w:sz w:val="56"/><w:color w:val="0D190D"/></w:rPr><w:t>${esc(title)}</w:t></w:r></w:p>`;
    body+=`<w:p><w:pPr><w:spacing w:after="0"/></w:pPr><w:r><w:rPr><w:sz w:val="16"/><w:color w:val="AAAAAA"/></w:rPr><w:t>${esc(ds)}</w:t></w:r></w:p>`;
    body+=`<w:p><w:pPr><w:spacing w:after="240"/><w:pBdr><w:bottom w:val="single" w:sz="4" w:space="4" w:color="E0E0E0"/></w:pBdr></w:pPr></w:p>`;
  }
  for(const raw of content.split('\n')){
    const {type,text}=parseLine(raw);
    if(type==='empty'){body+=`<w:p><w:pPr><w:spacing w:after="80"/></w:pPr></w:p>`;continue;}
    if(type==='hr'){body+=`<w:p><w:pPr><w:spacing w:after="120"/><w:pBdr><w:bottom w:val="single" w:sz="4" w:space="4" w:color="E0E0E0"/></w:pBdr></w:pPr></w:p>`;continue;}
    if(type==='h1'){body+=`<w:p><w:pPr><w:spacing w:before="240" w:after="80"/><w:pBdr><w:bottom w:val="single" w:sz="8" w:space="4" w:color="A3B18A"/></w:pBdr></w:pPr><w:r><w:rPr><w:b/><w:sz w:val="48"/><w:color w:val="0D190D"/></w:rPr><w:t>${esc(text)}</w:t></w:r></w:p>`;continue;}
    if(type==='h2'){body+=`<w:p><w:pPr><w:spacing w:before="200" w:after="60"/></w:pPr><w:r><w:rPr><w:b/><w:sz w:val="34"/><w:color w:val="1A3A1A"/></w:rPr><w:t>${esc(text)}</w:t></w:r></w:p>`;continue;}
    if(type==='h3'){body+=`<w:p><w:pPr><w:spacing w:before="160" w:after="40"/></w:pPr><w:r><w:rPr><w:b/><w:i/><w:sz w:val="26"/><w:color w:val="3A5A3A"/></w:rPr><w:t>${esc(text)}</w:t></w:r></w:p>`;continue;}
    if(type==='quote'){body+=`<w:p><w:pPr><w:spacing w:before="80" w:after="80"/><w:ind w:left="360" w:right="200"/><w:shd w:val="clear" w:color="auto" w:fill="F2F7EE"/><w:pBdr><w:left w:val="single" w:sz="18" w:space="8" w:color="A3B18A"/></w:pBdr></w:pPr>${runs(text,`<w:sz w:val="21"/><w:color w:val="2A4A2A"/>`)}</w:p>`;continue;}
    body+=`<w:p><w:pPr><w:spacing w:after="160"/><w:jc w:val="${jc}"/></w:pPr>${runs(text,`<w:sz w:val="22"/>`)}</w:p>`;
  }
  const zip=new JSZip();
  zip.file('[Content_Types].xml',`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/></Types>`);
  zip.folder('_rels').file('.rels',`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>`);
  const word=zip.folder('word');
  word.file('document.xml',`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:body>${body}<w:sectPr><w:pgMar w:top="1080" w:right="1080" w:bottom="1200" w:left="1080"/></w:sectPr></w:body></w:document>`);
  word.folder('_rels').file('document.xml.rels',`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"></Relationships>`);
  const blob=await zip.generateAsync({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`${title||'document'}.docx`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('DOCX exported! ✓');
}

/* ─── AI ─── */
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,95)+'px';}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function quickSend(t){document.getElementById('aiInput').value=t;sendMessage();}
function clearChat(){
  chatHistory=[];
  document.getElementById('aiMessages').innerHTML=`<div class="ai-empty" id="emptyState">
    <div class="ai-empty-icon">✦</div>
    <div class="ai-empty-title">Writing Assistant</div>
    <div class="ai-empty-sub">Ask me to fix grammar, change tone, rewrite, or suggest improvements.</div>
  </div>`;
}
async function sendMessage(){
  if(busy)return;
  const input=document.getElementById('aiInput');
  const msg=input.value.trim();if(!msg)return;
  document.getElementById('emptyState')?.remove();
  input.value='';input.style.height='auto';
  busy=true;document.getElementById('sendBtn').disabled=true;
  addMsg('user',msg);
  const typing=document.createElement('div');
  typing.className='typing-indicator';typing.id='typing';
  typing.innerHTML='<div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div>';
  document.getElementById('aiMessages').appendChild(typing);scrollBot();
  const sys=`You are a writing assistant inside TextForge.\nDocument:\nTITLE: ${ti.value.trim()||'(untitled)'}\nCONTENT:\n${te.value.trim()||'(empty)'}\n\nHelp the user. When providing a revised version to apply, write [APPLY] on its own line, then the revised text. Be concise.`;
  chatHistory.push({role:'user',content:msg});
  try{
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',headers:{'Authorization':`Bearer ${GROQ_KEY}`,'Content-Type':'application/json'},
      body:JSON.stringify({model:MODEL,messages:[{role:'system',content:sys},...chatHistory],max_tokens:1024})
    });
    const data=await res.json();
    const reply=data.choices?.[0]?.message?.content||'Something went wrong.';
    chatHistory.push({role:'assistant',content:reply});
    document.getElementById('typing')?.remove();addMsg('ai',reply);
  }catch{
    document.getElementById('typing')?.remove();addMsg('ai','Connection error. Please try again.');
  }
  busy=false;document.getElementById('sendBtn').disabled=false;
}
function addMsg(role,text){
  const box=document.getElementById('aiMessages');
  const div=document.createElement('div');div.className=`msg msg-${role}`;
  if(role==='ai'&&text.includes('[APPLY]')){
    const idx=text.indexOf('[APPLY]');
    const before=text.slice(0,idx).trim(),after=text.slice(idx+7).trim();
    if(before){const s=document.createElement('span');s.innerHTML=rTxt(before);div.appendChild(s);}
    if(after){
      const b=document.createElement('div');b.className='apply-block';b.textContent=after;div.appendChild(b);
      const ab=document.createElement('button');ab.className='apply-btn';ab.innerHTML='↙ Apply to document';
      ab.onclick=()=>{te.value=after;updateStats();if(splitActive)renderSplit();toast('Applied! ✓');};
      div.appendChild(ab);
    }
  }else{div.innerHTML=rTxt(text);}
  box.appendChild(div);scrollBot();
}
function rTxt(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/_(.*?)_/g,'<em>$1</em>').replace(/\n/g,'<br>');
}
function scrollBot(){const e=document.getElementById('aiMessages');e.scrollTop=e.scrollHeight;}

updateStats();

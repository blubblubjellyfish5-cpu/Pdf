<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TextForge</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --sage:#A3B18A;--sage-light:#c2ceaf;--sage-dim:rgba(163,177,138,0.13);
  --sage-border:rgba(163,177,138,0.25);--bg:#111a13;--bg2:#162019;--bg3:#0e1710;
  --glass:rgba(255,255,255,0.03);--glass2:rgba(255,255,255,0.06);
  --text:#d8e4d0;--text-dim:#6b836a;--white:#f0f4ec;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
  background-image:radial-gradient(ellipse 50% 60% at 10% 50%,rgba(163,177,138,.06) 0%,transparent 70%),
  radial-gradient(ellipse 40% 40% at 90% 20%,rgba(163,177,138,.04) 0%,transparent 65%);}
.app{display:flex;flex-direction:column;height:100vh;}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:52px;flex-shrink:0;
  border-bottom:1px solid var(--sage-border);background:rgba(14,23,16,.92);
  backdrop-filter:blur(14px);z-index:20;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.05rem;
  letter-spacing:.3em;text-transform:uppercase;color:var(--white);}
.logo em{color:var(--sage);font-style:normal;}
.hdr-stats{font-size:.7rem;color:var(--text-dim);letter-spacing:.05em;}
.hdr-stats span{color:var(--sage-light);font-weight:500;}

/* EXPORT BAR */
.export-bar{display:flex;align-items:center;gap:8px;padding:9px 20px;
  background:var(--bg3);border-bottom:1px solid var(--sage-border);
  flex-shrink:0;flex-wrap:wrap;}
.eb-label{font-size:.67rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);}
.page-select{background:var(--glass2);border:1px solid var(--sage-border);
  border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;
  font-size:.77rem;padding:5px 9px;outline:none;cursor:pointer;transition:border-color .2s;}
.page-select:focus{border-color:var(--sage);}
.page-select option{background:#162019;}
.xbtn{display:inline-flex;align-items:center;gap:5px;padding:6px 15px;border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;cursor:pointer;border:1px solid transparent;
  transition:all .2s;white-space:nowrap;}
.xbtn-pdf{background:var(--sage);color:var(--bg);border-color:var(--sage);}
.xbtn-pdf:hover{background:var(--sage-light);box-shadow:0 4px 14px rgba(163,177,138,.3);transform:translateY(-1px);}
.xbtn-doc{background:transparent;border-color:var(--sage-border);color:var(--sage-light);}
.xbtn-doc:hover{border-color:var(--sage);color:var(--sage);transform:translateY(-1px);}
.eb-right{margin-left:auto;display:flex;gap:8px;}

/* BODY */
.body{display:flex;flex:1;overflow:hidden;}

/* EDITOR */
.editor-panel{flex:1;display:flex;flex-direction:column;padding:18px 22px 0;
  border-right:1px solid var(--sage-border);overflow:hidden;min-width:0;}
.title-input{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;
  letter-spacing:.07em;text-transform:uppercase;background:transparent;
  border:none;color:var(--white);outline:none;width:100%;padding-bottom:10px;
  border-bottom:1px solid var(--sage-border);transition:border-color .25s;margin-bottom:12px;}
.title-input::placeholder{color:rgba(107,131,106,.28);}
.title-input:focus{border-bottom-color:var(--sage);}

.format-row{display:flex;align-items:center;gap:5px;padding-bottom:9px;
  border-bottom:1px solid var(--sage-border);margin-bottom:10px;flex-wrap:wrap;}
.fmt-btn{background:transparent;border:1px solid transparent;border-radius:5px;
  color:var(--text-dim);font-size:.77rem;padding:4px 9px;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all .18s;font-weight:500;}
.fmt-btn:hover,.fmt-btn.active{border-color:var(--sage-border);color:var(--sage-light);background:var(--sage-dim);}
.fmt-sep{width:1px;height:16px;background:var(--sage-border);}
.font-ctrl-row{display:flex;align-items:center;gap:7px;font-size:.71rem;color:var(--text-dim);}
.font-slider{-webkit-appearance:none;width:58px;height:2px;background:var(--sage-border);
  border-radius:2px;outline:none;cursor:pointer;}
.font-slider::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;
  border-radius:50%;background:var(--sage);cursor:pointer;}
.font-val{color:var(--sage-light);font-weight:500;min-width:26px;font-size:.71rem;}
.align-btn{background:transparent;border:1px solid transparent;border-radius:4px;
  padding:3px 6px;cursor:pointer;color:var(--text-dim);transition:all .18s;font-size:.74rem;}
.align-btn:hover,.align-btn.active{color:var(--sage);border-color:var(--sage-border);}

.text-editor{flex:1;width:100%;background:transparent;border:none;outline:none;
  resize:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;
  line-height:1.9;font-weight:300;letter-spacing:.01em;overflow-y:auto;padding-bottom:12px;
  scrollbar-width:thin;scrollbar-color:var(--sage-border) transparent;}
.text-editor::placeholder{color:rgba(107,131,106,.18);}

.editor-footer{display:flex;align-items:center;gap:8px;padding:9px 0 11px;
  border-top:1px solid var(--sage-border);flex-wrap:wrap;}
.ef-btn{background:transparent;border:1px solid transparent;border-radius:5px;
  color:var(--text-dim);font-size:.72rem;padding:4px 10px;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all .18s;display:inline-flex;align-items:center;gap:4px;}
.ef-btn:hover{color:var(--sage-light);border-color:var(--sage-border);}
.ef-right{margin-left:auto;}
.char-limit{font-size:.67rem;color:var(--text-dim);}
.char-limit span{color:var(--sage-light);}

/* AI PANEL */
.ai-panel{width:310px;flex-shrink:0;display:flex;flex-direction:column;background:var(--bg2);}
.ai-header{display:flex;align-items:center;justify-content:space-between;
  padding:12px 15px;border-bottom:1px solid var(--sage-border);}
.ai-hdr-left{display:flex;align-items:center;gap:8px;}
.ai-dot{width:7px;height:7px;border-radius:50%;background:var(--sage);
  box-shadow:0 0 8px var(--sage);animation:pulse 2.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 8px var(--sage);}50%{opacity:.3;box-shadow:0 0 3px var(--sage);}}
.ai-label{font-family:'Syne',sans-serif;font-size:.71rem;font-weight:700;
  letter-spacing:.2em;text-transform:uppercase;color:var(--sage-light);}
.clear-chat-btn{background:transparent;border:none;color:var(--text-dim);
  font-size:.67rem;cursor:pointer;padding:3px 7px;border-radius:4px;
  font-family:'DM Sans',sans-serif;transition:color .18s;}
.clear-chat-btn:hover{color:var(--sage);}

.ai-messages{flex:1;overflow-y:auto;padding:13px 12px;display:flex;flex-direction:column;
  gap:10px;scrollbar-width:thin;scrollbar-color:var(--sage-border) transparent;}
.ai-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:7px;text-align:center;padding:20px;}
.ai-empty-icon{font-size:1.9rem;opacity:.18;margin-bottom:4px;}
.ai-empty-title{font-family:'Syne',sans-serif;font-size:.8rem;font-weight:700;
  letter-spacing:.1em;color:var(--sage-light);}
.ai-empty-sub{font-size:.74rem;color:var(--text-dim);font-weight:300;line-height:1.6;}
.msg{padding:10px 12px;border-radius:10px;font-size:.81rem;line-height:1.65;
  font-weight:300;animation:fadeUp .25s ease;word-break:break-word;}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.msg-user{background:var(--sage-dim);border:1px solid var(--sage-border);
  color:var(--sage-light);align-self:flex-end;max-width:92%;}
.msg-ai{background:var(--glass2);border:1px solid rgba(255,255,255,.05);
  color:var(--text);align-self:flex-start;max-width:96%;}
.apply-block{margin-top:8px;padding:9px 11px;background:rgba(163,177,138,.07);
  border-left:2px solid var(--sage);border-radius:0 6px 6px 0;font-size:.78rem;
  white-space:pre-wrap;word-break:break-word;color:var(--text);}
.apply-btn{display:inline-flex;align-items:center;gap:4px;margin-top:6px;
  padding:4px 11px;background:var(--sage-dim);border:1px solid var(--sage-border);
  border-radius:5px;color:var(--sage);font-size:.71rem;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-weight:500;transition:all .18s;}
.apply-btn:hover{background:rgba(163,177,138,.2);transform:translateY(-1px);}
.typing-indicator{display:flex;gap:4px;padding:10px 12px;background:var(--glass2);
  border:1px solid rgba(255,255,255,.05);border-radius:10px;width:fit-content;align-self:flex-start;}
.t-dot{width:5px;height:5px;border-radius:50%;background:var(--text-dim);animation:tdot 1.2s infinite;}
.t-dot:nth-child(2){animation-delay:.18s;}.t-dot:nth-child(3){animation-delay:.36s;}
@keyframes tdot{0%,100%{transform:translateY(0);opacity:.35;}50%{transform:translateY(-4px);opacity:1;}}
.chips{display:flex;gap:5px;padding:0 12px 9px;flex-wrap:wrap;}
.chip{padding:4px 9px;border-radius:20px;border:1px solid var(--sage-border);
  font-size:.68rem;color:var(--text-dim);cursor:pointer;transition:all .18s;
  font-family:'DM Sans',sans-serif;font-weight:300;}
.chip:hover{border-color:var(--sage);color:var(--sage);background:var(--sage-dim);}
.ai-input-row{display:flex;gap:7px;align-items:flex-end;padding:10px 12px;
  border-top:1px solid var(--sage-border);}
.ai-input{flex:1;background:var(--glass2);border:1px solid var(--sage-border);
  border-radius:8px;padding:8px 11px;color:var(--text);font-family:'DM Sans',sans-serif;
  font-size:.81rem;font-weight:300;outline:none;resize:none;min-height:37px;max-height:95px;
  transition:border-color .2s;line-height:1.5;}
.ai-input::placeholder{color:rgba(107,131,106,.22);}
.ai-input:focus{border-color:var(--sage);}
.send-btn{width:37px;height:37px;border-radius:8px;background:var(--sage);border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .18s;}
.send-btn:hover{background:var(--sage-light);transform:translateY(-1px);box-shadow:0 4px 12px rgba(163,177,138,.3);}
.send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(14px);
  background:var(--sage);color:var(--bg);padding:8px 20px;border-radius:8px;
  font-size:.77rem;font-weight:600;opacity:0;
  transition:all .28s cubic-bezier(.34,1.56,.64,1);z-index:999;
  letter-spacing:.05em;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* FULLSCREEN BTN */
.fs-btn{background:transparent;border:1px solid var(--sage-border);border-radius:7px;
  color:var(--text-dim);padding:5px 10px;cursor:pointer;display:flex;align-items:center;
  gap:5px;font-size:.69rem;font-family:"DM Sans",sans-serif;transition:all .18s;}
.fs-btn:hover{border-color:var(--sage);color:var(--sage);}

/* PREVIEW MODAL */
.preview-overlay{position:fixed;inset:0;background:rgba(5,12,7,.9);
  backdrop-filter:blur(8px);z-index:200;display:flex;flex-direction:column;
  opacity:0;pointer-events:none;transition:opacity .25s ease;}
.preview-overlay.open{opacity:1;pointer-events:all;}
.preview-topbar{display:flex;align-items:center;gap:10px;padding:10px 20px;
  background:rgba(10,18,11,.98);border-bottom:1px solid var(--sage-border);
  flex-shrink:0;flex-wrap:wrap;}
.preview-title-label{font-family:"Syne",sans-serif;font-size:.72rem;font-weight:700;
  letter-spacing:.2em;text-transform:uppercase;color:var(--sage-light);}
.preview-close{margin-left:auto;background:transparent;border:1px solid var(--sage-border);
  border-radius:7px;color:var(--text-dim);padding:5px 14px;cursor:pointer;
  font-family:"DM Sans",sans-serif;font-size:.75rem;transition:all .18s;}
.preview-close:hover{border-color:#e07070;color:#e07070;}
.preview-dl-pdf{background:var(--sage);color:var(--bg);border:none;border-radius:7px;
  padding:6px 16px;font-family:"DM Sans",sans-serif;font-size:.75rem;font-weight:600;
  cursor:pointer;transition:all .18s;letter-spacing:.06em;}
.preview-dl-pdf:hover{background:var(--sage-light);}
.preview-dl-doc{background:transparent;border:1px solid var(--sage-border);border-radius:7px;
  color:var(--sage-light);padding:5px 14px;font-family:"DM Sans",sans-serif;
  font-size:.75rem;cursor:pointer;transition:all .18s;}
.preview-dl-doc:hover{border-color:var(--sage);color:var(--sage);}
.preview-body{flex:1;overflow-y:auto;display:flex;justify-content:center;
  padding:32px 16px 48px;background:#2a2a2a;
  scrollbar-width:thin;scrollbar-color:#555 transparent;}
.preview-page{background:#fff;width:210mm;min-height:297mm;padding:22mm 22mm 28mm;
  box-shadow:0 8px 48px rgba(0,0,0,.55);border-radius:2px;
  font-family:"DM Sans",sans-serif;color:#1e1e1e;font-size:11pt;
  line-height:1.8;position:relative;}
.preview-page.size-a5{width:148mm;min-height:210mm;font-size:9pt;}
.preview-page.size-a3{width:297mm;min-height:420mm;font-size:12pt;}
.preview-page.size-a2{width:420mm;min-height:594mm;}
.preview-page.size-a1{width:594mm;min-height:841mm;}
.pv-accentbar{height:3px;background:#A3B18A;margin-bottom:14px;border-radius:1px;}
.pv-doctitle{font-size:2em;font-weight:800;color:#0f190f;margin-bottom:3px;line-height:1.2;}
.pv-date{font-size:.72em;color:#aaa;margin-bottom:10px;}
.pv-titlediv{border:none;border-top:1px solid #ddd;margin:0 0 20px;}
.pv-h1{font-size:1.55em;font-weight:800;color:#0f190f;margin:20px 0 5px;
  padding-bottom:4px;border-bottom:1.5px solid #A3B18A;line-height:1.3;}
.pv-h2{font-size:1.18em;font-weight:700;color:#1e371e;margin:16px 0 4px;}
.pv-h3{font-size:1em;font-weight:700;font-style:italic;color:#3c5a3c;margin:10px 0 3px;}
.pv-quote{background:#f0f5ec;border-left:3.5px solid #A3B18A;
  padding:10px 16px;margin:10px 0 14px;border-radius:0 6px 6px 0;
  font-size:.93em;color:#2d4a2d;line-height:1.7;}
.pv-hr{border:none;border-top:1px solid #e0e0e0;margin:14px 0;}
.pv-body{margin-bottom:7px;font-weight:400;}
.pv-footer{border-top:1px solid #e0e0e0;padding-top:5px;margin-top:28px;
  display:flex;justify-content:space-between;font-size:.68em;color:#aaa;}
</style>
</head>
<body>
<div class="app">

<header>
  <div class="logo">TEXT<em>FORGE</em></div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="hdr-stats"><span id="wordNum">0</span> words · <span id="charNum">0</span> chars</div>
    <button class="fs-btn" id="fsBtn" onclick="toggleFullscreen()" title="Fullscreen">
      <svg id="fsIcon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
      Fullscreen
    </button>
  </div>
</header>

<!-- ALWAYS VISIBLE EXPORT BAR -->
<div class="export-bar">
  <span class="eb-label">Export as</span>
  <select class="page-select" id="pageSize">
    <option value="a1">A1</option>
    <option value="a2">A2</option>
    <option value="a3">A3</option>
    <option value="a4" selected>A4</option>
    <option value="a5">A5</option>
  </select>
  <button class="xbtn" style="background:transparent;border-color:var(--sage-border);color:var(--sage-light);" onclick="openPreview()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    Preview
  </button>
  <div class="eb-right">
    <button class="xbtn xbtn-doc" onclick="exportDOCX()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      DOCX
    </button>
    <button class="xbtn xbtn-pdf" onclick="exportPDF()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      PDF
    </button>
  </div>
</div>

<div class="body">

  <!-- EDITOR -->
  <div class="editor-panel">
    <input type="text" class="title-input" id="titleInput" placeholder="Document Title…">

    <div class="format-row">
      <button class="fmt-btn" onclick="fmtWrap('**')"><b>B</b></button>
      <button class="fmt-btn" onclick="fmtWrap('_')"><i>I</i></button>
      <div class="fmt-sep"></div>
      <div class="font-ctrl-row">
        <span>Aa</span>
        <input type="range" class="font-slider" id="fontSlider" min="12" max="24" value="15">
        <span class="font-val" id="fontVal">15</span>
      </div>
      <div class="fmt-sep"></div>
      <button class="align-btn active" id="al-left"   onclick="setAlign('left')"   title="Left">☰</button>
      <button class="align-btn"        id="al-center" onclick="setAlign('center')" title="Center">≡</button>
      <button class="align-btn"        id="al-right"  onclick="setAlign('right')"  title="Right">≣</button>
    </div>

    <textarea class="text-editor" id="textEditor" placeholder="Start writing here…

Tip: # Heading  ## Subheading  > Callout  **bold**  --- divider"></textarea>

    <div class="editor-footer">
      <button class="ef-btn" onclick="copyText()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copy
      </button>
      <button class="ef-btn" onclick="clearAll()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
        Clear
      </button>
      <div class="ef-right char-limit"><span id="charLeft">5000</span> chars left</div>
    </div>
  </div>

  <!-- AI PANEL -->
  <div class="ai-panel">
    <div class="ai-header">
      <div class="ai-hdr-left">
        <div class="ai-dot"></div>
        <span class="ai-label">AI Assistant</span>
      </div>
      <button class="clear-chat-btn" onclick="clearChat()">Clear chat</button>
    </div>

    <div class="ai-messages" id="aiMessages">
      <div class="ai-empty" id="emptyState">
        <div class="ai-empty-icon">✦</div>
        <div class="ai-empty-title">Writing Assistant</div>
        <div class="ai-empty-sub">Ask me to fix grammar, change tone, rewrite, or suggest improvements for your document.</div>
      </div>
    </div>

    <div class="chips">
      <div class="chip" onclick="quickSend('Fix grammar and spelling')">Fix grammar</div>
      <div class="chip" onclick="quickSend('Make it more formal')">Formal</div>
      <div class="chip" onclick="quickSend('Make it more concise')">Concise</div>
      <div class="chip" onclick="quickSend('Add a strong introduction')">Add intro</div>
      <div class="chip" onclick="quickSend('Improve the flow and transitions')">Better flow</div>
      <div class="chip" onclick="quickSend('Summarize in 3 lines')">Summarize</div>
      <div class="chip" onclick="quickSend('Make it more vivid and engaging')">More vivid</div>
      <div class="chip" onclick="quickSend('Write a strong conclusion')">Conclusion</div>
    </div>

    <div class="ai-input-row">
      <textarea class="ai-input" id="aiInput" placeholder="Ask anything…" rows="1"
        onkeydo
